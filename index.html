<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Headless 360 — Service Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #01172F;
    --navy-panel: #0A2547;
    --coral: #FF5D2D;
    --coral-dim: #8B3823;
    --mute: #5B7295;
    --dim: #3A4F6F;
    --sf-blue: #0D9DDA;
    --sf-link: #0176D3;
    --sf-bg: #F3F3F3;
    --sf-panel: #FFFFFF;
    --sf-border: #DDDBDA;
    --sf-text: #181818;
    --sf-text-mute: #706E6B;
    --sf-text-dim: #B0ADAB;
    --sf-header: #16325C;
    --hl-bg: #FAFAFA;
    --hl-panel: #FFFFFF;
    --hl-border: #E5E7EB;
    --hl-text: #0F172A;
    --hl-mute: #64748B;
    --hl-success: #166534;
  }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--navy);
    margin: 0;
    color: white;
  }
  .font-display { font-family: 'Fraunces', Georgia, serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .sf-text { color: var(--sf-text); }
  .sf-link { color: var(--sf-link); }
  .sf-bg { background: var(--sf-bg); }
  .sf-panel { background: var(--sf-panel); }
  .sf-border { border-color: var(--sf-border); }
  .sf-text-mute { color: var(--sf-text-mute); }
  .sf-text-dim { color: var(--sf-text-dim); }
  .sf-header { color: var(--sf-header); }
  .hl-bg { background: var(--hl-bg); }
  .hl-panel { background: var(--hl-panel); }
  .hl-border { border-color: var(--hl-border); }
  .hl-text { color: var(--hl-text); }
  .hl-mute { color: var(--hl-mute); }

  .seam-badge {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    line-height: 1;
    z-index: 50;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .seam-badge.ootb { background: rgba(91, 114, 149, 0.95); color: white; }
  .seam-badge.built { background: var(--coral); color: white; }
  .seam-on .seam-target { box-shadow: 0 0 0 2px rgba(91, 114, 149, 0.6); border-radius: 2px; }
  .seam-on .seam-target.built { box-shadow: 0 0 0 2px var(--coral); }

  .fade-in { animation: fadeIn 600ms ease-out forwards; opacity: 0; }
  @keyframes fadeIn { to { opacity: 1; } }

  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; background: var(--coral);
    box-shadow: 0 0 0 0 rgba(255, 93, 45, 0.6);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 93, 45, 0.6); }
    70% { box-shadow: 0 0 0 8px rgba(255, 93, 45, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 93, 45, 0); }
  }

  .kb-highlight {
    background: linear-gradient(180deg, transparent 60%, rgba(255, 93, 45, 0.18) 60%);
  }

  .scroll-y::-webkit-scrollbar { width: 6px; }
  .scroll-y::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

  .stage-button { animation: gentleNudge 2.4s ease-in-out infinite; }
  @keyframes gentleNudge {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  .reasoning-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    line-height: 1.7;
  }

  .scenario-card { transition: all 200ms ease; }
  .scenario-card:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState } = React;

// ============================================================
// THREE SCENARIOS
// ============================================================
const SCENARIOS = {

    caseNumber: "00084231",
    sentimentValue: 85,
    sentimentLabel: "Frustrated · escalating",
    sentimentNote: "Cumulative frustration detected. Pattern: third repeat contact, prior unresolved.",
    classification: ["billing.dispute", "service.outage.intermittent", "customer.repeat_caller", "sentiment.escalating"],
    transcript: [

    },
    recommendedAction: "Acknowledge pattern. Refund $40 immediately. Offer compensation for outage period.",

    response: "Maria, I can see this is your third call this week, and I want to apologise — you shouldn't have had to call back at all. I can see the outage in your area, and the $40 charge that was added without your authorisation. I'm refunding the $40 right now, and I'm crediting your account for the past nine days of disrupted service. I'll also flag your account so you don't get transferred again. Can I confirm those details with you?",

      timeFromCallToResolution: "2 minutes",

    reasoning: [
      { stage: 1, lines: [
        "→ classifier: case.type = billing.dispute",
        "→ classifier: case.subtype = unauthorised_charge",
        "→ classifier: customer.history.repeat_caller = TRUE (3 calls / 7 days)",

        "// 4 features above threshold for 'high-stakes-cognitive' route",
      ]},
      { stage: 2, lines: [

        "→ surface[1]: unauthorised_charge (correlation: 0.94)",
        "→ surface[2]: transfer_history (correlation: 0.87)",
        "→ collapse: 27 standard fields (correlation < 0.4)",
        "→ knowledge.fetch(query=case_context, n=1)",
        "→ KB-1124 selected (94% match)",
      ]},
      { stage: 3, lines: [
        "→ response.generate(template=accountable, signal=cumulative_frustration)",
        "→ response.tone = measured | accountable | brief",
        "→ response.includes_acknowledgement = TRUE",
        "→ response.length_target = short (audience: time-pressured)",
        "→ check_authority(refund=40, credit=50) → both authorised",
        "→ render: response_card + 3 pre-authorised actions",

    ],
  },

    id: "david",

    badgeColor: "amber",

    transcript: [
      { speaker: "Customer", time: "0:05", text: "Hi, this is David Patel from Bayside Cafe. I got an email saying my payment failed." },

    reasoning: [
      { stage: 1, lines: [
        "→ classifier: case.type = payment.failure",
        "→ classifier: case.subtype = direct_debit_bounce",
        "→ classifier: customer.segment = small_business",
        "→ classifier: account.recent_change = bank_switch (3d ago)",
        "→ classifier: sentiment.trajectory = calm_urgent",
        "→ classifier: time.until_service_degradation = 16 minutes",
        "// time.pressure flag → boost field weights for 'time-to-resolve' fields",

      { stage: 2, lines: [

        "→ surface[0]: payment_failure_reason (correlation: 0.96)",
        "→ surface[1]: degradation_timer (correlation: 0.98 + time_pressure_boost)",
        "→ surface[2]: customer_impact_signal (parsed from transcript: 'function tonight')",

        "→ response.tone = warm | direct | low-friction",

  aisha: {

    callsThisWeekLabel: "5th call · 14 days",

// ============================================================
// SEAM BADGE
// ============================================================
const SeamBadge = ({ kind, label, position = "top-right" }) => {
  const positionStyles = {
    "top-right": { top: 4, right: 4 },
    "top-left": { top: 4, left: 4 },
    "bottom-right": { bottom: 4, right: 4 },
    "bottom-left": { bottom: 4, left: 4 },
  };
  return (
    <div className={`seam-badge ${kind}`} style={positionStyles[position]}>
      {label}
    </div>
  );
};

// ============================================================
// OOTB SERVICE CLOUD VIEW
// ============================================================

    ["Subject", s.headline],
    ["Description", s.summary.substring(0, 60) + "..."],
    ["Type", s.id === "maria" ? "Billing" : s.id === "david" ? "Billing" : "Cancellation"],

// REASONING TRACE
// ============================================================
const ReasoningTrace = ({ scenario, stage }) => {
  const allLines = [];
  for (let i = 1; i <= stage; i++) {
    const stageBlock = scenario.reasoning.find((r) => r.stage === i);
    if (stageBlock) {
      if (i > 1) allLines.push({ type: "separator", stage: i });
      stageBlock.lines.forEach((line) => allLines.push({ type: "line", text: line, stage: i }));
    }
  }

  return (
    <div className="rounded-lg p-4 sticky top-0" style={{ background: "#0F172A", color: "#94A3B8" }}>
      <div className="flex items-center gap-2 mb-3">
        <div className="reasoning-line" style={{ color: "var(--coral)" }}>// reasoning_trace</div>
        <div className="ml-auto reasoning-line" style={{ color: "#475569" }}>headless engine</div>
      </div>
      <div className="space-y-1 reasoning-line max-h-96 overflow-y-auto scroll-y">
        {allLines.map((line, i) => {
          if (line.type === "separator") {
            return <div key={i} className="border-t border-slate-700 my-2 reasoning-line text-slate-600">// stage {line.stage}</div>;
          }
          const isComment = line.text.startsWith("//");
          return (
            <div key={i} style={{ color: isComment ? "#64748B" : "#94A3B8" }}>
              {line.text}
            </div>
          );
        })}
      </div>
    </div>
  );
};

          <div className="text-xs uppercase tracking-widest hl-mute font-medium mb-3">Compared to OOTB baseline</div>
          <div className="text-base hl-text">
            <span className="hl-mute italic">Without the orchestration layer, this case </span>
            {s.summaryImpact.ootbBaseline}<span className="hl-mute italic">.</span>
          </div>
        </div>

        <div className="hl-panel border-2 rounded-lg p-6 mt-6 fade-in" style={{ borderColor: "var(--coral)", animationDelay: "750ms" }}>
          <div className="text-xs uppercase tracking-widest font-medium mb-3" style={{ color: "var(--coral)" }}>What we decided</div>
          <div className="grid grid-cols-3 gap-6 text-sm">
            <div>
              <div className="hl-mute text-xs uppercase tracking-wider mb-1">Which fields matter</div>
              <div className="hl-text">{s.surfacedFields.length} fields surfaced. {s.id === "maria" ? "27" : "37"} collapsed.</div>
            </div>
            <div>
              <div className="hl-mute text-xs uppercase tracking-wider mb-1">Tone of response</div>
              <div className="hl-text">{s.responseTone.replace("Tone: ", "")}</div>
            </div>
            <div>
              <div className="hl-mute text-xs uppercase tracking-wider mb-1">Who decides</div>
              <div className="hl-text">{handover > 0 ? "Specialist (auto-routed)" : "Agent (AI suggested)"}</div>
            </div>
          </div>
        </div>

        <div className="text-center mt-8 fade-in" style={{ animationDelay: "900ms" }}>
          <button
            onClick={onContinue}
            className="px-6 py-2.5 text-sm font-medium rounded text-white"
            style={{ background: "var(--coral)" }}
          >
            ← Back to scenario picker
          </button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// SCENARIO PICKER
// ============================================================
const ScenarioPicker = ({ onPick }) => {
  return (
    <div style={{ minHeight: "100%", padding: "32px", background: "white" }}>
      <div className="max-w-6xl mx-auto">
        <div className="mb-8">
          <div className="text-xs uppercase tracking-widest" style={{ color: "var(--coral)", letterSpacing: "0.2em" }}>
            Same engine. Different cases.
          </div>
          <div className="text-2xl font-display mt-2 hl-text">Three scenarios. Pick one.</div>
          <div className="text-sm hl-mute mt-1 italic">Each case requires different fields, different tone, different decisions.</div>
        </div>

        <div className="grid grid-cols-3 gap-6">
          {Object.values(SCENARIOS).map((s) => {
            const dotColor = s.badgeColor === "red" ? "bg-red-700" :
                            s.badgeColor === "orange" ? "bg-orange-600" :
                            "bg-amber-500";
            const textColor = s.badgeColor === "red" ? "text-red-700" :
                            s.badgeColor === "orange" ? "text-orange-700" :
                            "text-amber-700";
            return (
              <div
                key={s.id}
                onClick={() => onPick(s.id)}
                className="scenario-card hl-panel border hl-border rounded-lg p-6 cursor-pointer hover:shadow-lg"
              >
                <div className="flex items-center gap-2 mb-3">
                  <div className={`w-2 h-2 rounded-full ${dotColor}`}></div>
                  <div className={`text-xs font-medium uppercase tracking-wider ${textColor}`}>{s.badge}</div>
                </div>
                <div className="text-xl font-display hl-text mb-1">{s.customerName}</div>
                <div className="text-xs hl-mute mb-4">{s.customerType}</div>
                <div className="text-sm hl-text font-medium mb-2">{s.headline}</div>
                <div className="text-xs hl-mute leading-relaxed">{s.summary}</div>

                <div className="mt-5 pt-4 border-t hl-border flex items-center justify-between">
                  <div className="text-xs hl-mute">{s.callsThisWeekLabel}</div>
                  <div className="text-xs font-medium" style={{ color: "var(--coral)" }}>Run scenario →</div>
                </div>
              </div>
            );
          })}
        </div>

        <div className="mt-10 hl-panel border hl-border rounded-lg p-5 bg-gray-50">
          <div className="text-xs uppercase tracking-widest hl-mute font-medium mb-2">How this demo works</div>
          <div className="grid grid-cols-3 gap-4 text-xs hl-text">
            <div>
              <div className="font-semibold mb-1">1. Pick a scenario</div>
              <div className="hl-mute">Three different shapes of customer problem. Same underlying engine handles each one differently.</div>
            </div>
            <div>
              <div className="font-semibold mb-1">2. Walk through it stage by stage</div>
              <div className="hl-mute">You control the pacing. Each stage of the demo waits for your click — talk for as long as you need.</div>
            </div>
            <div>
              <div className="font-semibold mb-1">3. Toggle the seam</div>
              <div className="hl-mute">Show OOTB versus Built. Show the reasoning trace. Show the handover. End with the scenario summary.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// MAIN APP
// ============================================================
const App = () => {
  const [view, setView] = useState("picker");
  const [seamOn, setSeamOn] = useState(false);
  const [stage, setStage] = useState(0);
  const [activeScenarioId, setActiveScenarioId] = useState(null);

  const activeScenario = activeScenarioId ? SCENARIOS[activeScenarioId] : null;

  const pickScenario = (id) => {
    setActiveScenarioId(id);
    setStage(0);
    setSeamOn(false);
    setView("ootb");
  };

  const advanceStage = () => {
    if (stage < 3) setStage(stage + 1);
    else if (stage === 3 && activeScenario) setView("summary");
  };

  const handleHandover = () => setView("handover");

  const backToScenarios = () => {
    setView("picker");
    setActiveScenarioId(null);
    setStage(0);
    setSeamOn(false);
  };

  const stageLabel = (n) => {
    if (n === 1) return "Conversation captured. Sentiment + classification running.";
    if (n === 2) return "Relevant context surfaced. Fields chosen by case shape.";
    if (n === 3) return "Response drafted in tone-matched register. Agent decides what to send.";
    return "";
  };

  return (
    <div style={{ minHeight: "100vh", background: "var(--navy)", display: "flex", flexDirection: "column" }}>
      <div className="px-8 py-5 flex items-center gap-6" style={{ borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
        <div>
          <div className="font-display italic text-2xl text-white" style={{ color: "var(--coral)" }}>Headless 360</div>
          <div className="text-xs uppercase tracking-widest" style={{ color: "var(--mute)", letterSpacing: "0.15em" }}>
            Service · Three cases · One engine
          </div>
        </div>

        <div className="ml-auto flex items-center gap-3">
          {view === "picker" && (
            <div className="text-xs italic" style={{ color: "var(--mute)" }}>Pick a scenario to start</div>
          )}

          {(view === "ootb" || view === "headless") && (
            <>
              <div className="flex bg-black/20 rounded p-1">
                <button
                  onClick={() => setView("ootb")}
                  className={`px-4 py-1.5 text-xs font-medium rounded transition ${
                    view === "ootb" ? "bg-white text-black" : "text-white/60 hover:text-white"
                  }`}
                >
                  OOTB Service Cloud
                </button>
                <button
                  onClick={() => setView("headless")}
                  className={`px-4 py-1.5 text-xs font-medium rounded transition ${
                    view === "headless" ? "text-white" : "text-white/60 hover:text-white"
                  }`}
                  style={view === "headless" ? { background: "var(--coral)" } : {}}
                >
                  Headless + Generative UI
                </button>
              </div>

              <button
                onClick={() => setSeamOn(!seamOn)}
                className="px-3 py-1.5 text-xs font-medium rounded border transition"
                style={{
                  borderColor: seamOn ? "var(--coral)" : "rgba(255,255,255,0.2)",
                  color: seamOn ? "var(--coral)" : "rgba(255,255,255,0.7)",
                  background: seamOn ? "rgba(255,93,45,0.1)" : "transparent",
                }}
              >
                {seamOn ? "Hide seam + reasoning" : "Show seam + reasoning"}
              </button>
            </>
          )}

          {view === "headless" && stage === 0 && (
            <button
              onClick={() => setStage(1)}
              className="stage-button px-4 py-1.5 text-xs font-medium rounded text-white"
              style={{ background: "var(--coral)" }}
            >
              ▶ Start scenario
            </button>
          )}

          {view === "headless" && stage > 0 && stage < 3 && (
            <button
              onClick={advanceStage}
              className="stage-button px-4 py-1.5 text-xs font-medium rounded text-white"
              style={{ background: "var(--coral)" }}
            >
              Next stage →
            </button>
          )}

          {view === "headless" && stage === 3 && (
            <button
              onClick={() => setView("summary")}
              className="stage-button px-4 py-1.5 text-xs font-medium rounded text-white"
              style={{ background: "var(--coral)" }}
            >
              View summary →
            </button>
          )}

          {(view === "ootb" || view === "headless" || view === "handover" || view === "summary") && (
            <button
              onClick={backToScenarios}
              className="px-3 py-1.5 text-xs font-medium rounded border text-white/70 hover:text-white"
              style={{ borderColor: "rgba(255,255,255,0.2)" }}
            >
              ↺ Pick another
            </button>
          )}
        </div>
      </div>

      {view === "headless" && stage > 0 && activeScenario && (
        <div
          className="px-8 py-2.5 text-xs flex items-center gap-4"
          style={{ background: "var(--navy-panel)", borderBottom: "1px solid rgba(255,255,255,0.05)" }}
        >
          <span style={{ color: "var(--coral)", letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 500 }}>
            {activeScenario.customerName} · Stage {stage} of 3
          </span>
          <span style={{ color: "var(--mute)" }}>{stageLabel(stage)}</span>
          <span className="ml-auto text-xs italic" style={{ color: "var(--mute)" }}>
            Click "Next stage" when you're ready to advance
          </span>
        </div>
      )}

      {view === "ootb" && activeScenario && (
        <div
          className="px-8 py-2.5 text-xs flex items-center gap-4"
          style={{ background: "var(--navy-panel)", borderBottom: "1px solid rgba(255,255,255,0.05)" }}
        >
          <span style={{ color: "var(--mute)", letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 500 }}>
            {activeScenario.customerName} · OOTB view
          </span>
          <span style={{ color: "var(--mute)" }} className="italic">
            The agent has all this data. They have to translate it into action themselves.
          </span>
          <span className="ml-auto text-xs italic" style={{ color: "var(--mute)" }}>
            Switch to Headless when ready →
          </span>
        </div>
      )}

      <div className="flex-1 p-6">
        <div
          className={`rounded-lg overflow-hidden shadow-2xl ${seamOn ? "seam-on" : ""}`}
          style={{ background: "white", minHeight: "calc(100vh - 220px)" }}
        >
          {view === "picker" && <ScenarioPicker onPick={pickScenario} />}
          {view === "ootb" && activeScenario && <OOTBView seamOn={seamOn} scenario={activeScenario} />}
          {view === "headless" && activeScenario && (
            <HeadlessView
              seamOn={seamOn}
              scenario={activeScenario}
              stage={stage}
              onAdvance={(action) => action === "handover" && handleHandover()}
            />
          )}
          {view === "handover" && activeScenario && (
            <HandoverView scenario={activeScenario} onBack={() => setView("headless")} />
          )}
          {view === "summary" && activeScenario && (
            <ScenarioSummaryView scenario={activeScenario} onContinue={backToScenarios} />
          )}
        </div>
      </div>

      <div
        className="px-8 py-3 text-xs flex items-center justify-between"
        style={{ borderTop: "1px solid rgba(255,255,255,0.05)", color: "var(--mute)" }}
      >
        <div className="flex gap-6">
          {activeScenario ? (
            <span>
              <span style={{ color: "var(--coral)", fontWeight: 500 }}>{activeScenario.customerName}</span>
              {" · "}{activeScenario.headline}
            </span>
          ) : (
            <span>Three scenarios. Same engine. Different decisions.</span>
          )}
        </div>
        <div className="flex gap-3 italic">
          <span>Standardise the core. Differentiate the experience.</span>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
